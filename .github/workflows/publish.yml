name: publish

# Build the visualization site and deploy to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - ".asdlc/knowledge/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml mkdocs-material pymdown-extensions mkdocs-redirects
      - name: Regenerate viz config + graph
        working-directory: .asdlc/knowledge
        run: python3 tools/kb.py viz
      - name: Build site
        working-directory: .asdlc/knowledge
        run: mkdocs build --strict --site-dir site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .asdlc/knowledge/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
