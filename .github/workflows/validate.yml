name: validate

# Deterministic health check on every PR and on main.
# (push is scoped to main so PR branches don't run the same lint twice.)
#
# The weekly `schedule` matters even though nothing changes on a cron run:
# staleness is time-relative, so `verified_max_age_days` / `stale_after_days`
# only trip as the clock advances. Without a scheduled run a page silently ages
# past its window and nobody hears about it until the next push.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml jsonschema
      - name: kb lint --strict
        working-directory: .asdlc/knowledge
        run: python3 tools/kb.py lint --strict
      # Triage view of which pages are due for re-verification. Informational on
      # push/PR; the weekly cron is what surfaces newly-stale pages over time.
      - name: kb verify --all
        working-directory: .asdlc/knowledge
        run: python3 tools/kb.py verify --all
