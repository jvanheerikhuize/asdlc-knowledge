name: validate

# Deterministic health check on every push/PR.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml jsonschema
      - name: kb lint --strict
        working-directory: .asdlc/knowledge
        run: python3 tools/kb.py lint --strict
