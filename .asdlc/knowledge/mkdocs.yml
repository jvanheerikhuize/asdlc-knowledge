# GENERATED by tools/viz.py from manifest.yaml. Do not hand-edit.
site_name: 'ASDLC Knowledge Base'
site_description: 'A persistent, file-based, agent-agnostic knowledge base built on the "LLM wiki" pattern: raw sources are ingested once, compiled into an interlinked markdown wiki, and kept honest with confidence scoring and fact-checking.'
docs_dir: wiki
theme:
  name: material
  features: [navigation.instant, navigation.top, search.suggest, content.code.copy]
  palette:
    - scheme: default
      toggle: {icon: material/brightness-7, name: dark}
    - scheme: slate
      toggle: {icon: material/brightness-4, name: light}
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
extra_javascript:
  # Powers the homepage 3D view (global ForceGraph3D); bundles three.js.
  - https://cdn.jsdelivr.net/npm/3d-force-graph@1
extra_css:
  # Icons for the nav page-status markers (see `extra.status` below). Generated
  # into wiki/assets/status.css by `python tools/kb.py viz`.
  - assets/status.css
extra:
  # Page-status markers: Material renders a small icon + hover tooltip next to a
  # nav entry whose `status:` frontmatter matches a key here. The text is the
  # tooltip; the icon comes from extra_css. Keys mirror the `status` field that
  # scaffold/ingest set and `verify` flips (kept honest by `kb lint`).
  status:
    verified: Verified against its cited sources
    draft: Draft — not yet fact-checked
plugins:
  - search
  # Material's built-in tags plugin (no extra dependency): turns the free-form
  # `tags:` frontmatter into a browsable index. The `<!-- material/tags -->`
  # marker in wiki/tags.md is where the plugin injects the grouped listing
  # (the deprecated `tags_file:` option is intentionally omitted).
  - tags
  # Redirect alias URLs (from pages' `aliases:` frontmatter) to the
  # canonical page, so an old/alternate name resolves by URL too.
  - redirects:
      redirect_maps:
        "asai.md": "entities/akari-asai.md"
        "asdlc-kb.md": "entities/asdlc-knowledge-base.md"
        "edge.md": "entities/darren-edge.md"
        "facebook-ai-research.md": "entities/meta-ai.md"
        "facebook-ai-similarity-search.md": "entities/faiss.md"
        "fair.md": "entities/meta-ai.md"
        "karpathy.md": "entities/andrej-karpathy.md"
        "karpukhin.md": "entities/vladimir-karpukhin.md"
        "lewis.md": "entities/patrick-lewis.md"
        "malkov.md": "entities/yury-malkov.md"
        "mkdocs-material.md": "entities/mkdocs.md"
        "msr.md": "entities/microsoft-research.md"
        "reimers.md": "entities/nils-reimers.md"
        "this-repo.md": "entities/asdlc-knowledge-base.md"
        "yu-a-malkov.md": "entities/yury-malkov.md"
# Resolve [[wikilinks]] -> real links at build time (tools/mkdocs_hooks.py).
# Keeps wiki/ source canonical while the published site behaves like a wiki.
hooks:
  - tools/mkdocs_hooks.py
