# GENERATED by tools/viz.py from manifest.yaml. Do not hand-edit.
site_name: 'ASDLC Knowledge Base'
site_description: 'A persistent, file-based, agent-agnostic knowledge base built on the "LLM wiki" pattern: raw sources are ingested once, compiled into an interlinked markdown wiki, and kept honest with confidence scoring and fact-checking.'
docs_dir: wiki
theme:
  name: material
  features: [navigation.instant, navigation.top, search.suggest, content.code.copy]
  palette:
    - scheme: default
      toggle: {icon: material/brightness-7, name: dark}
    - scheme: slate
      toggle: {icon: material/brightness-4, name: light}
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
extra_javascript:
  # Powers the homepage 3D view (global ForceGraph3D); bundles three.js.
  - https://cdn.jsdelivr.net/npm/3d-force-graph@1
plugins:
  - search
# Resolve [[wikilinks]] -> real links at build time (tools/mkdocs_hooks.py).
# Keeps wiki/ source canonical while the published site behaves like a wiki.
hooks:
  - tools/mkdocs_hooks.py
nav:
  - Overview: index.md
  - Sources:
      - asdlc-knowledge-readme: sources/asdlc-knowledge-readme.md
      - karpathy-llm-wiki: sources/karpathy-llm-wiki.md
      - llm-wiki-setup-guide-2026: sources/llm-wiki-setup-guide-2026.md
      - rag-lewis-2020: sources/rag-lewis-2020.md
  - Entities:
      - andrej-karpathy: entities/andrej-karpathy.md
      - asdlc-knowledge-base: entities/asdlc-knowledge-base.md
      - patrick-lewis: entities/patrick-lewis.md
  - Concepts:
      - llm-wiki-pattern: concepts/llm-wiki-pattern.md
      - retrieval-augmented-generation: concepts/retrieval-augmented-generation.md
